version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: miniapp_postgres
    restart: always
    environment:
      - POSTGRES_USER=stickerloot
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=stickerloot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: miniapp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: miniapp_api
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stickerloot:SecurePass123!@postgres:5432/stickerloot_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: miniapp_bot
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stickerloot:SecurePass123!@postgres:5432/stickerloot_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: miniapp_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./docker/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: miniapp_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis_data:
  postgres_data:
