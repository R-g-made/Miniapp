version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: miniapp_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-stickerloot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-stickerloot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: miniapp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: miniapp_api
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stickerloot:SecurePass123!@postgres:5432/stickerloot_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: miniapp_bot
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stickerloot:SecurePass123!@postgres:5432/stickerloot_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: miniapp_frontend
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - api

volumes:
  redis_data:
  postgres_data:
